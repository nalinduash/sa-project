spring.application.name=bookfair-app
server.port=8080

#spring.datasource.url=jdbc:mysql://localhost:3306/bookfair_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.url=jdbc:mysql://localhost:3306/bookfair_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=bookfair_user
spring.datasource.password=bookfair_pass
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

jwt.secret=bookfairsecretkeybookfairsecretkeybookfairsecretkey
jwt.expiration=86400000

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

#ashika
app.cors.allowed-origins=http://localhost:3000,http://localhost:3001

security.ratelimit.requests=60
security.ratelimit.windowSeconds=60

jwt.accessExpiration=900000
jwt.refreshExpiration=604800000
security.passwordreset.ttlSeconds=900
